<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2129;
    --panel-2: #222b35;
    --border: #2d3845;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #4c9eeb;
    --pass: #2ea043;
    --fail: #e5534b;
    --blocked: #d29922;
    --na: #6e7681;
    --pending: #3d4754;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5; font-size: 14px;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, #16202b, #131a22);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px; backdrop-filter: blur(6px);
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header .sub { color: var(--muted); font-size: 12px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .bar-outer { height: 10px; background: var(--panel-2); border-radius: 6px; overflow: hidden; margin-top: 10px; }
  .bar-inner { height: 100%; background: linear-gradient(90deg, var(--pass), #3fb950); width: 0%; transition: width .3s; }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; font-size: 12px; }
  .stat { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.pass { background: var(--pass); } .dot.fail { background: var(--fail); }
  .dot.blocked { background: var(--blocked); } .dot.na { background: var(--na); }
  .dot.pending { background: var(--pending); }
  .toolbar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  button.tool {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  button.tool:hover { border-color: var(--accent); }
  section.group { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; margin: 18px 0; overflow: hidden; }
  .group-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; cursor: pointer; user-select: none; background: var(--panel-2);
  }
  .group-head:hover { background: #283340; }
  .group-head h2 { margin: 0; font-size: 15px; }
  .group-head .meta { color: var(--muted); font-size: 12px; }
  .group-note { padding: 10px 18px; color: var(--muted); font-size: 12px; border-bottom: 1px solid var(--border); background: #161d25; }
  .group-body { display: block; }
  .group.collapsed .group-body { display: none; }
  .test {
    display: grid; grid-template-columns: 1fr 150px; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--border); align-items: start;
  }
  .test:last-child { border-bottom: none; }
  .test .title { font-weight: 600; }
  .test .expected { color: var(--muted); font-size: 12.5px; margin-top: 3px; }
  .test .auto {
    margin-top: 8px; font-size: 12px; padding: 6px 10px; border-radius: 6px;
    background: #11212c; border-left: 3px solid var(--accent); color: #bcd5e6;
  }
  .test .auto.pass { border-left-color: var(--pass); }
  .test .auto.fail { border-left-color: var(--fail); }
  .controls { display: flex; flex-direction: column; gap: 6px; }
  select.status {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px; font-size: 12px;
  }
  select.status.pass { border-color: var(--pass); color: #6fdc8c; }
  select.status.fail { border-color: var(--fail); color: #ff8b82; }
  select.status.blocked { border-color: var(--blocked); color: #e3b341; }
  select.status.na { border-color: var(--na); }
  textarea.notes {
    width: 100%; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px; font-size: 11px; resize: vertical; min-height: 28px; font-family: inherit;
  }
  .priority { display:inline-block; font-size:10px; padding:1px 7px; border-radius:10px; margin-left:8px; vertical-align: middle; }
  .priority.p1 { background:#3a1416; color:#ff8b82; border:1px solid #5c2125; }
  .priority.p2 { background:#3a2e0f; color:#e3b341; border:1px solid #5c4a1f; }
  code { background:#0c1218; padding:1px 5px; border-radius:4px; font-size:12px; color:#9ecbff; }
  a { color: var(--accent); }
  .legend { font-size: 11px; color: var(--muted); margin-top: 6px; }
</style>
</head>

// ---- Rendering -------------------------------------------------------------
const STORE = "pediascrybe_testplan_v1";
const STATUSES = ["pending","pass","fail","blocked","na"];
const LABEL = { pending:"⬜ Pending", pass:"✅ Pass", fail:"❌ Fail", blocked:"⛔ Blocked", na:"➖ N/A" };
let state = JSON.parse(localStorage.getItem(STORE) || "{}");

function save(){ localStorage.setItem(STORE, JSON.stringify(state)); }
function get(id){ return state[id] || {}; }

function render(){
  const root = document.getElementById("root");
  root.innerHTML = "";
  for (const g of DATA){
    const sec = document.createElement("section");
    sec.className = "group" + (g.open ? "" : " collapsed");
    const counts = g.tests.reduce((a,t)=>{ const s=(get(t.id).status)||(t.auto?t.auto.s:"pending"); a[s]=(a[s]||0)+1; return a; }, {});
    const done = (counts.pass||0)+(counts.na||0);
    sec.innerHTML = `
      <div class="group-head" onclick="this.parentElement.classList.toggle('collapsed')">
        <h2>${g.title}</h2>
        <span class="meta">${done}/${g.tests.length} done${counts.fail?` · <span style="color:var(--fail)">${counts.fail} fail</span>`:""}${counts.blocked?` · <span style="color:var(--blocked)">${counts.blocked} blocked</span>`:""}</span>
      </div>
      ${g.note?`<div class="group-note">${g.note}</div>`:""}
      <div class="group-body"></div>`;
    const body = sec.querySelector(".group-body");
    for (const t of g.tests){
      const cur = get(t.id);
      const status = cur.status || (t.auto ? t.auto.s : "pending");
      const row = document.createElement("div");
      row.className = "test";
      row.innerHTML = `
        <div>
          <div class="title">${t.title}${t.p?`<span class="priority p${t.p}">P${t.p}</span>`:""}</div>
          <div class="expected">${t.expected}</div>
          ${t.auto?`<div class="auto ${t.auto.s}">${t.auto.t}</div>`:""}
        </div>
        <div class="controls">
          <select class="status ${status}" data-id="${t.id}">
            ${STATUSES.map(s=>`<option value="${s}" ${s===status?"selected":""}>${LABEL[s]}</option>`).join("")}
          </select>
          <textarea class="notes" data-id="${t.id}" placeholder="notes…">${cur.notes||""}</textarea>
        </div>`;
      body.appendChild(row);
    }
    root.appendChild(sec);
  }
  bind();
  updateStats();
}

function bind(){
  document.querySelectorAll("select.status").forEach(el=>{
    el.onchange = e=>{ const id=e.target.dataset.id; state[id]={...get(id), status:e.target.value}; save(); render(); };
  });
  document.querySelectorAll("textarea.notes").forEach(el=>{
    el.onblur = e=>{ const id=e.target.dataset.id; state[id]={...get(id), notes:e.target.value}; save(); };
  });
}

function updateStats(){
  const all = DATA.flatMap(g=>g.tests);
  const c = { pass:0, fail:0, blocked:0, na:0, pending:0 };
  for (const t of all){ const s = (get(t.id).status)||(t.auto?t.auto.s:"pending"); c[s]=(c[s]||0)+1; }
  const total = all.length;
  const done = c.pass + c.na;
  document.getElementById("bar").style.width = (100*done/total).toFixed(1)+"%";
  document.getElementById("stats").innerHTML = `
    <span class="stat"><span class="dot pass"></span>${c.pass} pass</span>
    <span class="stat"><span class="dot fail"></span>${c.fail} fail</span>
    <span class="stat"><span class="dot blocked"></span>${c.blocked} blocked</span>
    <span class="stat"><span class="dot na"></span>${c.na} n/a</span>
    <span class="stat"><span class="dot pending"></span>${c.pending} pending</span>
    <span class="stat" style="color:var(--muted)">· ${done}/${total} complete</span>`;
}

function expandAll(open){ document.querySelectorAll("section.group").forEach(s=>s.classList.toggle("collapsed", !open)); }
function resetAll(){ if(confirm("Clear all recorded statuses and notes?")){ state={}; save(); render(); } }
function exportJSON(){
  const out = DATA.map(g=>({ group:g.title, tests:g.tests.map(t=>({ id:t.id, title:t.title, status:(get(t.id).status)||(t.auto?t.auto.s:"pending"), notes:get(t.id).notes||"" })) }));
  const blob = new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="pediascrybe-test-results.json"; a.click();
}
render();
</script>
</body>
</html>
